version: '3.8'

services:
  # 1. Cơ sở dữ liệu SQL (PostgreSQL)
  postgres:
    image: postgres:15
    container_name: zerotrust_postgres
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=zerotrust_sql
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Cơ sở dữ liệu NoSQL (MongoDB)
  mongodb:
    image: mongo:6
    container_name: zerotrust_mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
    ports:
      - "27019:27017"
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  mongodata: